<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Portal</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f4f6f9;
      color: #333;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    .card {
      background: #fff;
      border-radius: 10px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
      padding: 3rem 2.5rem;
      max-width: 520px;
      width: 100%;
      text-align: center;
    }

    .icon { font-size: 3.5rem; margin-bottom: 1.25rem; }

    h1 {
      font-size: 1.6rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
      color: #1a1a2e;
    }

    .subtitle {
      font-size: 0.95rem;
      color: #888;
      margin-bottom: 2rem;
    }

    .services {
      display: flex;
      flex-direction: column;
      gap: 1rem;
      margin-bottom: 2rem;
    }

    .services a {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 1rem 1.25rem;
      background: #f8f9fc;
      border-radius: 8px;
      text-decoration: none;
      color: #333;
      transition: background 0.2s, box-shadow 0.2s;
    }

    .services a:hover {
      background: #eef1f8;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
    }

    .services .svc-icon { font-size: 1.8rem; flex-shrink: 0; }

    .services .svc-info { text-align: left; }

    .services .svc-name {
      font-size: 1rem;
      font-weight: 600;
      color: #1a1a2e;
    }

    .services .svc-desc {
      font-size: 0.85rem;
      color: #777;
      margin-top: 0.2rem;
    }

    .footer {
      font-size: 0.8rem;
      color: #aaa;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">🛡️</div>
    <h1>Portal</h1>
    <p class="subtitle">Your client certificate was verified. Choose a service below.</p>

    <div class="services">
      <a href="/mtls-app/">
        <span class="svc-icon">🔐</span>
        <span class="svc-info">
          <span class="svc-name">mTLS App (Passwordless)</span>
          <span class="svc-desc">No-password JWT auth via X.509 certificate</span>
        </span>
      </a>
      <a href="/node-app/">
        <span class="svc-icon">🖥️</span>
        <span class="svc-info">
          <span class="svc-name">Application</span>
          <span class="svc-desc">Node.js + React demo app</span>
        </span>
      </a>
      <a href="/auth/">
        <span class="svc-icon">🔑</span>
        <span class="svc-info">
          <span class="svc-name">Keycloak</span>
          <span class="svc-desc">Identity provider &amp; admin console</span>
        </span>
      </a>
    </div>

    <div class="footer">mTLS-protected environment</div>
  </div>
</body>
</html>
