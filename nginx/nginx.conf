# =============================================================================
# nginx.conf  –  mTLS identity wall
# =============================================================================
# This file sets global Nginx directives.
# Virtual-host / proxy rules live in conf.d/default.conf.
# =============================================================================

user  nginx;
worker_processes  auto;

error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" ssl_verify=$ssl_client_verify '
                    'ssl_subject="$ssl_client_s_dn"';

    access_log /var/log/nginx/access.log main;

    sendfile        on;
    keepalive_timeout 65;

    # Disable server version disclosure
    server_tokens off;

    # TLS defaults (can be overridden per server block)
    ssl_protocols             TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers               ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305;
    ssl_session_cache         shared:SSL:10m;
    ssl_session_timeout       30s;
    ssl_session_tickets       off;

    include /etc/nginx/conf.d/*.conf;
}
