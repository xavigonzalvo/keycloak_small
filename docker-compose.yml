# =============================================================================
# Topology:
#   Internet → nginx (mTLS / PIV card wall, port 443)
#                 ├── /auth/*      → Keycloak (IDP)
#                 └── /node-app/* → node-app (JWT consumer)
#
#   Keycloak persists its data in Postgres.
# =============================================================================

services:

  # ---------------------------------------------------------------------------
  # Postgres – backing store for Keycloak
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: kc_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       keycloak
      POSTGRES_USER:     keycloak
      POSTGRES_PASSWORD: keycloak_secret   # replace in production
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keycloak -d keycloak"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ---------------------------------------------------------------------------
  # Keycloak – Identity Provider
  # ---------------------------------------------------------------------------
  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    container_name: keycloak
    restart: unless-stopped
    command:
      - start-dev
      - --import-realm                      # auto-import realm on first boot
    environment:
      KC_DB:               postgres
      KC_DB_URL:           jdbc:postgresql://postgres:5432/keycloak
      KC_DB_USERNAME:      keycloak
      KC_DB_PASSWORD:      keycloak_secret  # keep in sync with postgres service
      KC_HOSTNAME:         ${APP_FQDN}
      KC_HTTP_RELATIVE_PATH: /auth
      KC_PROXY_HEADERS:    xforwarded
      KC_HTTP_ENABLED:     "true"
      KC_HTTP_PORT:        "8080"
      KC_HEALTH_ENABLED:   "true"
      KEYCLOAK_ADMIN:      admin
      KEYCLOAK_ADMIN_PASSWORD: admin_secret   # replace in production
    volumes:
      - ./keycloak/realms:/opt/keycloak/data/import:ro
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - internal
    # Keycloak is NOT published directly; nginx is the only ingress point.
    healthcheck:
      test: ["CMD", "bash", "-c", "exec 3<>/dev/tcp/localhost/8080 && printf 'GET /auth/health/ready HTTP/1.0\r\nHost: localhost\r\n\r\n' >&3 && grep -q 'UP' <&3"]
      interval: 15s
      timeout: 10s
      retries: 15
      start_period: 90s

  # ---------------------------------------------------------------------------
  # Node.js + React application – JWT consumer
  # ---------------------------------------------------------------------------
  node-app:
    build:
      context: ./app-node
      dockerfile: Dockerfile
    container_name: node_app
    restart: unless-stopped
    environment:
      KEYCLOAK_ISSUER: https://${APP_FQDN}/auth/realms/myrealm
      JWT_ALGORITHM: RS256
      JWT_AUDIENCE: node-app
      JWKS_URI: http://keycloak:8080/auth/realms/myrealm/protocol/openid-connect/certs
      KEYCLOAK_CLIENT_ID: node-app
      KEYCLOAK_CLIENT_SECRET: node-app-secret
      TOKEN_ENDPOINT: http://keycloak:8080/auth/realms/myrealm/protocol/openid-connect/token
      REDIRECT_URI: https://${APP_FQDN}/node-app/callback
      SECRET_KEY: node-dev-secret-change-in-production
    depends_on:
      keycloak:
        condition: service_healthy
    networks:
      - internal

  # ---------------------------------------------------------------------------
  # Nginx – mTLS reverse proxy / identity wall
  # ---------------------------------------------------------------------------
  nginx:
    image: nginx:1.27-alpine
    container_name: nginx_proxy
    restart: unless-stopped
    ports:
      - "443:443"
      - "80:80"     # optional: redirect HTTP → HTTPS
    environment:
      APP_FQDN: ${APP_FQDN}
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/templates:/etc/nginx/templates:ro   # envsubst renders to /etc/nginx/conf.d/
      - ./nginx/certs:/etc/nginx/certs:ro            # server cert + CA bundle for mTLS
      - ./nginx/html:/etc/nginx/html:ro              # custom static pages (e.g. no-cert.html)
    depends_on:
      keycloak:
        condition: service_healthy
      node-app:
        condition: service_started
    networks:
      - internal

# =============================================================================
# Shared resources
# =============================================================================
volumes:
  postgres_data:

networks:
  internal:
    driver: bridge
